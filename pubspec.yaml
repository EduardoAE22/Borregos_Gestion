name: borregos_gestion
description: App Flutter de gestion para Borregos (sede Progreso).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  excel: ^4.0.6
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/borregos_logo.png
